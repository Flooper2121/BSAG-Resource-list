  { id:"b16", cat:"Business & Finance", name:"Blackstone Launchpad", url:"https://www.blackstonelaunchpad.org/", target:"College students interested in entrepreneurship", desc:"University-based entrepreneurship program providing mentorship, community, and resources for student founders.", type:"Program", notes:"" },
  { id:"b17", cat:"Business & Finance", name:"Scholars of Finance", url:"https://scholarsoffinance.org/", target:"Underrepresented college students interested in finance", desc:"Financial literacy and professional mentorship program connecting diverse students to the finance industry.", type:"Program", notes:"" },
  { id:"b18", cat:"Business & Finance", name:"Girls Who Invest", url:"https://www.girlswhoinvest.org/", target:"Women pursuing careers in investment management", desc:"Summer intensive and fellowship program educating women on investment management and preparing them for careers in the industry.", type:"Fellowship", notes:"" },
  { id:"b19", cat:"Business & Finance", name:"CREN (Collegiate Real Estate Network)", url:"https://www.crenweb.org/", target:"College students interested in real estate", desc:"National network providing real estate education, events, and career resources for collegiate students.", type:"Program", notes:"" },
  { id:"b20", cat:"Business & Finance", name:"Diversity on Wall Street", url:"https://www.diversityonwallstreet.org/", target:"Underrepresented college students in finance", desc:"Annual summit and career fair connecting diverse students with leading financial services and investment firms.", type:"Conference", notes:"" },
  { id:"b21", cat:"Business & Finance", name:"LEAD for Diversity", url:"https://www.leadfordiversity.org/", target:"Black, Latinx, and underrepresented undergraduates in business", desc:"Multi-day leadership conference connecting underrepresented students with top firms for internship and full-time recruiting opportunities.", type:"Conference", notes:"" },
  // Technology & STEM
  { id:"t16", cat:"Technology & STEM", name:"Blacks in Technology (BIT)", url:"https://www.blacksintechnology.net/", target:"Black students and professionals in tech", desc:"Community, events, and career resources supporting Black technologists and students entering the tech industry.", type:"Program", notes:"" },
  // Cross-Industry
  { id:"c13", cat:"Cross-Industry", name:"ALPFA (Association of Latino Professionals For America)", url:"https://www.alpfa.org/", target:"Latino undergraduate and graduate students across all industries", desc:"Career development, scholarships, and internship access for Latino professionals and students across all industries.", type:"Program", notes:"" },
  // Law & Policy
  { id:"l16", cat:"Law & Policy", name:"Education Pioneers Fellowship", url:"https://educationpioneers.org/", target:"Graduate and undergraduate students interested in education sector careers", desc:"Fellowship placing high-potential individuals in strategic and leadership roles at leading education reform organizations.", type:"Fellowship", notes:"" },
  // ── MANUALLY ADDED ──
  // Business & Finance
  { id:"b22", cat:"Business & Finance", name:"BLK Capital Management", url:"https://www.blkcapitalmanagement.org/", target:"Underrepresented college students interested in finance and investment management", desc:"Finance-focused program providing underrepresented students with exposure to investment management, capital markets, and professional development.", type:"Program", notes:"" },
  { id:"b23", cat:"Business & Finance", name:"BLK Consulting Group", url:"https://www.blkconsultinggroup.org/", target:"Underrepresented undergraduates interested in consulting", desc:"Selective global BA program training underrepresented students in client discovery, case analysis, and structured problem solving. 50 students selected globally.", type:"Fellowship", notes:"" },
  { id:"b24", cat:"Business & Finance", name:"BlackGen Capital", url:"https://www.blackgencapital.com/", target:"Black and underrepresented students interested in finance and investing", desc:"Finance and investment program building the next generation of Black finance professionals through education, mentorship, and industry exposure.", type:"Program", notes:"Verify URL before sharing" },
  // Media & Sports
  { id:"m19", cat:"Media & Sports", name:"Make a Play Foundation", url:"https://makeaplayfoundation.com/", target:"Student-athletes and youth athletes", desc:"Foundation supporting student-athletes through mentorship, career development, and community programming.", type:"Program", notes:"" },
];

const EMPTY = { name:"", url:"", target:"", desc:"", notes:"", cat:"Cross-Industry", type:"Program" };

// ─── Component ────────────────────────────────────────────────────────────────
function BSAGResources() {
  const [all,       setAll]      = useState(DATA);
  const [ready,     setReady]    = useState(false);
  const [activeCat, setCat]      = useState("All");
  const [activeType,setType]     = useState("All");
  const [q,         setQ]        = useState("");
  const [modal,     setModal]    = useState(null); // null | 'add' | 'edit' | 'del'
  const [form,      setForm]     = useState(EMPTY);
  const [editId,    setEditId]   = useState(null);
  const [delId,     setDelId]    = useState(null);
  const [toast,     setToast]    = useState(null);

  // Load persisted data — merges any new seed entries not yet in storage
  useEffect(() => {
    try {
      const raw = localStorage.getItem("bsag-opps");
      if (raw) {
        const stored = JSON.parse(raw);
        const storedIds = new Set(stored.map(x => x.id));
        const newItems = DATA.filter(x => !storedIds.has(x.id));
        setAll(newItems.length > 0 ? [...stored, ...newItems] : stored);
      }
    } catch {}
    setReady(true);
  }, []);

  // Save on change
  useEffect(() => {
    if (!ready) return;
    try { localStorage.setItem("bsag-opps", JSON.stringify(all)); } catch {}
  }, [all, ready]);

  const flash = (msg, v = "ok") => {
    setToast({ msg, v });
    setTimeout(() => setToast(null), 2800);
  };

  // Filtering
  const filtered = all.filter(r => {
    if (activeCat !== "All" && r.cat !== activeCat) return false;
    if (activeType !== "All" && r.type !== activeType) return false;
    if (q) {
      const s = q.toLowerCase();
      return r.name.toLowerCase().includes(s) ||
             r.target.toLowerCase().includes(s) ||
             r.desc.toLowerCase().includes(s) ||
             (r.notes || "").toLowerCase().includes(s);
    }
    return true;
  });

  const catMeta = (key) => CATS.find(c => c.key === key) || { color:"#6B7280", light:"#F9FAFB" };

  // CRUD
  const openAdd = () => {
    setForm({ ...EMPTY, cat: activeCat === "All" ? "Cross-Industry" : activeCat });
    setModal("add");
  };
  const openEdit = (r) => {
    setForm({ name:r.name, url:r.url, target:r.target, desc:r.desc, notes:r.notes||"", cat:r.cat, type:r.type });
    setEditId(r.id);
    setModal("edit");
  };
  const openDel = (id) => { setDelId(id); setModal("del"); };

  const saveResource = () => {
    if (!form.name.trim() || !form.url.trim()) return;
    if (modal === "add") {
      setAll(p => [...p, { ...form, id: "u" + Date.now() }]);
      flash(`"${form.name}" added!`);
    } else {
      setAll(p => p.map(r => r.id === editId ? { ...r, ...form } : r));
      flash(`"${form.name}" updated.`);
    }
    setModal(null);
  };

  const deleteResource = () => {
    const name = all.find(r => r.id === delId)?.name;
    setAll(p => p.filter(r => r.id !== delId));
    setModal(null);
    flash(`"${name}" removed.`, "del");
  };

  // ── Styles ──────────────────────────────────────────────────────────────────
  const F = "'DM Sans', sans-serif";
  const NAVY = "#07103A";
  const GOLD = "#D4AF37";

  const style = {
    root:     { fontFamily:F, minHeight:"100vh", background:"#EDF0FA", color:"#1A1D3C" },
    hdr:      { background:`linear-gradient(135deg, ${NAVY} 0%, #162060 100%)`, color:"white", padding:"22px 28px 18px" },
    hdrRow:   { maxWidth:1200, margin:"0 auto", display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:10 },
    htitle:   { fontFamily:"'Syne',sans-serif", fontSize:22, fontWeight:800, letterSpacing:"-0.4px" },
    hsub:     { fontSize:12, color:"#7B92C2", marginTop:3 },
    addBtn:   { background:GOLD, color:NAVY, border:"none", borderRadius:8, padding:"9px 18px", fontFamily:"'Syne',sans-serif", fontWeight:700, fontSize:13, cursor:"pointer", whiteSpace:"nowrap", letterSpacing:"0.2px" },
    ctrl:     { background:"white", borderBottom:"1px solid #E2E8F0", padding:"13px 28px" },
    ctrlIn:   { maxWidth:1200, margin:"0 auto" },
    srow:     { display:"flex", gap:10, marginBottom:13, flexWrap:"wrap" },
    sWrap:    { position:"relative", flex:"1 1 200px" },
    sIcon:    { position:"absolute", left:10, top:"50%", transform:"translateY(-50%)", color:"#94A3B8", fontSize:13, pointerEvents:"none" },
    sInput:   { width:"100%", padding:"8px 10px 8px 30px", border:"1.5px solid #E2E8F0", borderRadius:8, fontSize:13, fontFamily:F, outline:"none", boxSizing:"border-box" },
    sel:      { padding:"8px 12px", border:"1.5px solid #E2E8F0", borderRadius:8, fontSize:13, fontFamily:F, background:"white", color:"#374151", cursor:"pointer" },
    tabs:     { display:"flex", gap:7, overflowX:"auto", paddingBottom:2, scrollbarWidth:"none" },
    main:     { maxWidth:1200, margin:"0 auto", padding:"20px 28px 48px" },
    grid:     { display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(295px,1fr))", gap:14 },
    card:     (ci) => ({ background:"white", borderRadius:12, padding:"16px 18px", boxShadow:"0 1px 3px rgba(0,0,0,0.06)", border:"1px solid #E8ECF4", display:"flex", flexDirection:"column", gap:9, borderTop:`3px solid ${ci.color}` }),
    chead:    { display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:8 },
    cname:    { fontFamily:"'Syne',sans-serif", fontWeight:700, fontSize:14, color:NAVY, lineHeight:1.3, flex:1 },
    cbtns:    { display:"flex", gap:4, flexShrink:0 },
    eBtn:     { background:"#F1F5F9", border:"none", borderRadius:5, padding:"3px 8px", fontSize:11, cursor:"pointer", color:"#64748B" },
    dBtn:     { background:"#FFF5F5", border:"none", borderRadius:5, padding:"3px 8px", fontSize:11, cursor:"pointer", color:"#EF4444" },
    badges:   { display:"flex", gap:5, flexWrap:"wrap" },
    badge:    (bg, tx) => ({ background:bg, color:tx, fontSize:11, fontWeight:600, padding:"2px 8px", borderRadius:10 }),
    cdesc:    { fontSize:12.5, color:"#475569", lineHeight:1.5, flexGrow:1 },
    ctgt:     { fontSize:12, color:"#64748B", background:"#F8FAFC", borderRadius:6, padding:"5px 9px" },
    cnotes:   { fontSize:12, color:"#6B21A8", background:"#F5F3FF", borderRadius:6, padding:"5px 9px", fontStyle:"italic" },
    clink:    { fontSize:12, color:"#2563EB", textDecoration:"none", fontWeight:500 },
    overlay:  { position:"fixed", inset:0, background:"rgba(0,0,0,0.55)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:1000, padding:20 },
    mbox:     { background:"white", borderRadius:16, padding:26, width:"100%", maxWidth:480, maxHeight:"90vh", overflowY:"auto", boxShadow:"0 20px 60px rgba(0,0,0,0.3)" },
    mbox2:    { background:"white", borderRadius:16, padding:26, width:"100%", maxWidth:360, boxShadow:"0 20px 60px rgba(0,0,0,0.3)" },
    mtitle:   { fontFamily:"'Syne',sans-serif", fontSize:17, fontWeight:800, marginBottom:18, color:NAVY },
    lbl:      { display:"block", fontSize:12, fontWeight:600, color:"#374151", marginBottom:4 },
    mi:       { width:"100%", padding:"8px 10px", border:"1.5px solid #E2E8F0", borderRadius:7, fontSize:13, fontFamily:F, outline:"none", boxSizing:"border-box" },
    mta:      { width:"100%", padding:"8px 10px", border:"1.5px solid #E2E8F0", borderRadius:7, fontSize:13, fontFamily:F, outline:"none", boxSizing:"border-box", resize:"vertical" },
    msel:     { width:"100%", padding:"8px 10px", border:"1.5px solid #E2E8F0", borderRadius:7, fontSize:13, fontFamily:F, background:"white", outline:"none" },
    mfoot:    { display:"flex", gap:10, justifyContent:"flex-end", marginTop:20 },
    cancel:   { padding:"9px 18px", background:"#F1F5F9", border:"none", borderRadius:8, fontSize:13, cursor:"pointer", fontFamily:F, color:"#374151" },
    submit:   { padding:"9px 18px", background:NAVY, color:"white", border:"none", borderRadius:8, fontSize:13, cursor:"pointer", fontFamily:"'Syne',sans-serif", fontWeight:700 },
    toastBox: (v) => ({ position:"fixed", bottom:20, right:20, background: v==="del"?"#374151":NAVY, color:"white", padding:"11px 18px", borderRadius:10, fontSize:13, boxShadow:"0 4px 20px rgba(0,0,0,0.25)", zIndex:2000, borderLeft:`4px solid ${v==="del"?"#EF4444":GOLD}`, fontFamily:F }),
  };

  // ── Render ──────────────────────────────────────────────────────────────────
  return (
    <div style={style.root}>

      {/* HEADER */}
      <div style={style.hdr}>
        <div style={style.hdrRow}>
          <div>
            <div style={style.htitle}>
              <span style={{ color: GOLD }}>BSAG</span> Opportunity Resource List
            </div>
            <div style={style.hsub}>
              {all.length} resources · Emory Black Student Athlete Group
            </div>
          </div>
          <button style={style.addBtn} onClick={openAdd}>+ Add Resource</button>
        </div>
      </div>

      {/* CONTROLS */}
      <div style={style.ctrl}>
        <div style={style.ctrlIn}>
          <div style={style.srow}>
            <div style={style.sWrap}>
              <span style={style.sIcon}>🔍</span>
              <input
                style={style.sInput}
                value={q}
                onChange={e => setQ(e.target.value)}
                placeholder="Search by name, audience, or description…"
              />
            </div>
            <select style={style.sel} value={activeType} onChange={e => setType(e.target.value)}>
              <option value="All">All Types</option>
              {TYPES.map(t => <option key={t} value={t}>{t}</option>)}
            </select>
          </div>

          <div style={style.tabs}>
            {[{ key:"All", label:"All", color: NAVY }, ...CATS].map(c => (
              <button
                key={c.key}
                onClick={() => setCat(c.key)}
                style={{
                  padding: "5px 13px", borderRadius: 20, border: "none", cursor: "pointer",
                  fontFamily: F, fontSize: 12.5, fontWeight: 500, whiteSpace: "nowrap",
                  background: activeCat === c.key ? c.color : "#F1F5F9",
                  color: activeCat === c.key ? "white" : "#64748B",
                  transition: "all 0.15s",
                }}
              >
                {c.label}{" "}
                <span style={{ opacity: 0.75, fontSize: 11 }}>
                  ({c.key === "All" ? all.length : all.filter(r => r.cat === c.key).length})
                </span>
              </button>
            ))}
          </div>
        </div>
      </div>

      {/* MAIN GRID */}
      <div style={style.main}>
        {filtered.length === 0 ? (
          <div style={{ textAlign:"center", padding:60, color:"#94A3B8" }}>
            <div style={{ fontSize:36 }}>🔍</div>
            <div style={{ marginTop:10, fontSize:15, fontWeight:500 }}>No resources match your filters.</div>
            <div style={{ fontSize:13, marginTop:6 }}>Try adjusting your search or clearing the category/type filters.</div>
          </div>
        ) : (
          <div style={style.grid}>
            {filtered.map(r => {
              const ci = catMeta(r.cat);
              const tc = TC[r.type] || TC.Program;
              return (
                <div key={r.id} style={style.card(ci)}>
                  <div style={style.chead}>
                    <div style={style.cname}>{r.name}</div>
                    <div style={style.cbtns}>
                      <button style={style.eBtn} onClick={() => openEdit(r)} title="Edit">✏️</button>
                      <button style={style.dBtn} onClick={() => openDel(r.id)} title="Remove">🗑</button>
                    </div>
                  </div>

                  <div style={style.badges}>
                    <span style={style.badge(tc.bg, tc.tx)}>{r.type}</span>
                    <span style={style.badge(ci.light, ci.color)}>{r.cat}</span>
                  </div>

                  <div style={style.cdesc}>{r.desc}</div>

                  <div style={style.ctgt}>
                    <span style={{ fontWeight:500 }}>👥 Target: </span>{r.target}
                  </div>

                  {r.notes && (
                    <div style={style.cnotes}>📝 {r.notes}</div>
                  )}

                  <a href={r.url} target="_blank" rel="noopener noreferrer" style={style.clink}>
                    🔗 Visit Program →
                  </a>
                </div>
              );
            })}
          </div>
        )}

        <div style={{ textAlign:"center", marginTop:22, fontSize:12, color:"#94A3B8" }}>
          Showing {filtered.length} of {all.length} resources
        </div>
      </div>

      {/* ADD / EDIT MODAL */}
      {(modal === "add" || modal === "edit") && (
        <div style={style.overlay} onClick={e => { if (e.target === e.currentTarget) setModal(null); }}>
          <div style={style.mbox}>
            <div style={style.mtitle}>
              {modal === "add" ? "＋ Add New Resource" : "✏️ Edit Resource"}
            </div>

            <div style={{ display:"grid", gap:12 }}>
              <div>
                <label style={style.lbl}>Program Name *</label>
                <input style={style.mi} value={form.name} onChange={e => setForm(f => ({...f, name:e.target.value}))} placeholder="e.g., Goldman Sachs Possibilities Series" />
              </div>
              <div>
                <label style={style.lbl}>URL *</label>
                <input style={style.mi} value={form.url} onChange={e => setForm(f => ({...f, url:e.target.value}))} placeholder="https://…" />
              </div>
              <div>
                <label style={style.lbl}>Target Audience</label>
                <input style={style.mi} value={form.target} onChange={e => setForm(f => ({...f, target:e.target.value}))} placeholder="e.g., Underrepresented undergraduate sophomores" />
              </div>
              <div>
                <label style={style.lbl}>Description</label>
                <textarea style={style.mta} rows={3} value={form.desc} onChange={e => setForm(f => ({...f, desc:e.target.value}))} placeholder="Brief description of the program…" />
              </div>
              <div>
                <label style={style.lbl}>Notes (optional)</label>
                <input style={style.mi} value={form.notes} onChange={e => setForm(f => ({...f, notes:e.target.value}))} placeholder="e.g., Great for freshmen · Deadline: Nov 1 · Recommended" />
              </div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
                <div>
                  <label style={style.lbl}>Category</label>
                  <select style={style.msel} value={form.cat} onChange={e => setForm(f => ({...f, cat:e.target.value}))}>
                    {CATS.map(c => <option key={c.key} value={c.key}>{c.label}</option>)}
                  </select>
                </div>
                <div>
                  <label style={style.lbl}>Type</label>
                  <select style={style.msel} value={form.type} onChange={e => setForm(f => ({...f, type:e.target.value}))}>
                    {TYPES.map(t => <option key={t} value={t}>{t}</option>)}
                  </select>
                </div>
              </div>
            </div>

            <div style={style.mfoot}>
              <button style={style.cancel} onClick={() => setModal(null)}>Cancel</button>
              <button
                style={{ ...style.submit, opacity: (!form.name.trim() || !form.url.trim()) ? 0.5 : 1 }}
                onClick={saveResource}
                disabled={!form.name.trim() || !form.url.trim()}
              >
                {modal === "add" ? "Add Resource" : "Save Changes"}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* DELETE MODAL */}
      {modal === "del" && (
        <div style={style.overlay} onClick={e => { if (e.target === e.currentTarget) setModal(null); }}>
          <div style={style.mbox2}>
            <div style={style.mtitle}>Remove Resource?</div>
            <div style={{ fontSize:13.5, color:"#64748B", marginBottom:20, lineHeight:1.6 }}>
              Remove <strong>"{all.find(r => r.id === delId)?.name}"</strong> from the list? This cannot be undone.
            </div>
            <div style={style.mfoot}>
              <button style={style.cancel} onClick={() => setModal(null)}>Cancel</button>
              <button style={{ ...style.submit, background:"#EF4444" }} onClick={deleteResource}>Remove</button>
            </div>
          </div>
        </div>
      )}

      {/* TOAST */}
      {toast && (
        <div style={style.toastBox(toast.v)}>{toast.msg}</div>
      )}
    </div>
  );
}


    ReactDOM.createRoot(document.getElementById('root')).render(<BSAGResources />);
  </script>

</body>
</html>
